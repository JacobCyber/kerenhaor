<svg width="400" height="400" viewBox="0 0 400 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Outer glow circle -->
  <circle cx="200" cy="200" r="180" fill="#fef3c7" opacity="0.3"/>
  <circle cx="200" cy="200" r="140" fill="#fde68a" opacity="0.4"/>
  <!-- Sun/light rays -->
  <g stroke="#f5a623" stroke-width="4" stroke-linecap="round" opacity="0.7">
    <line x1="200" y1="40" x2="200" y2="80"/>
    <line x1="200" y1="320" x2="200" y2="360"/>
    <line x1="40" y1="200" x2="80" y2="200"/>
    <line x1="320" y1="200" x2="360" y2="200"/>
    <line x1="87" y1="87" x2="115" y2="115"/>
    <line x1="285" y1="285" x2="313" y2="313"/>
    <line x1="87" y1="313" x2="115" y2="285"/>
    <line x1="285" y1="115" x2="313" y2="87"/>
  </g>
  <!-- Inner circle -->
  <circle cx="200" cy="200" r="80" fill="#f5a623"/>
  <!-- Star of David / Magen David outline -->
  <polygon points="200,130 256,185 256,215 200,270 144,215 144,185" fill="none" stroke="white" stroke-width="5" stroke-linejoin="round"/>
  <polygon points="200,270 256,215 256,185 200,130 144,185 144,215" fill="none" stroke="white" stroke-width="5" stroke-linejoin="round"/>
  <!-- Flame/heart shape inside -->
  <path d="M200 160 C220 180 220 210 200 230 C180 210 180 180 200 160Z" fill="white" opacity="0.9"/>
</svg>
